apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-project
  labels:
    app: minio-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: minio-project
  template:
    metadata:
      labels:
        app: minio-project
    spec:
      serviceAccountName: minio-project-sa
      containers:
        - name: minio-project
          image: minio-project:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: MINIO_ENDPOINT
              value: "minio:9000"
            - name: MINIO_ACCESS_KEY
              value: "minioadmin"
            - name: MINIO_SECRET_KEY
              value: "minioadmin"
            - name: BUCKET_NAME
              value: "my-bucket"  
  
  
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20